<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passengers — TrainMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <style>
    /* Apple Color Emoji webfont — forces Apple-style emojis on every device */
    @font-face {
      font-family: 'Apple Color Emoji';
      src: url('https://cdn.jsdelivr.net/gh/samuelngs/apple-emoji-linux@latest/fonts/apple-emoji.ttf') format('truetype');
      font-display: swap;
    }
    .apple-emoji,
    .mobile-brand,
    .logo-icon,
    .success-icon,
    .sidebar-toggle,
    .modal-close {
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif !important;
      font-style: normal;
      font-weight: normal;
      font-variant: normal;
      text-transform: none;
      line-height: 1;
    }
    body, h1, h2, h3, p, span, button, label, input, select, td, th, a {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <nav id="sidebar"></nav>

  <div class="main-content">
    <header class="mobile-header">
      <span class="mobile-brand"><span class="apple-emoji">🚆</span> TrainMS</span>
      <button class="sidebar-toggle" aria-label="Toggle navigation" onclick="toggleSidebar()"><span class="apple-emoji">☰</span></button>
    </header>

    <div class="page-header">
      <h1>Passengers</h1>
      <div class="page-header-actions">
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Passenger</button>
      </div>
    </div>

    <div class="page-body">

      <div class="stat-grid section" id="stat-grid"></div>

      <div class="card">
        <div class="card-header">
          <h2 id="table-heading">All Passengers</h2>
          <span id="table-count" class="text-muted"></span>
        </div>
        <div class="card-body">
          <div class="filter-bar">
            <div class="form-group">
              <label for="search-input">Search by Name or ID</label>
              <input type="text" id="search-input" placeholder="e.g. Alice or P001">
            </div>
          </div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Contact</th>
                <th>Email</th>
                <th>Bookings</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="passengers-body"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" id="pax-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Passenger</h3>
        <button class="modal-close" aria-label="Close" onclick="closeModal('pax-modal')"><span class="apple-emoji">❌</span></button>
      </div>
      <div class="modal-body">
        <form id="pax-form" novalidate>
          <input type="hidden" id="pax-id">
          <div class="form-row">
            <div class="form-group">
              <label for="f-name">Full Name</label>
              <input type="text" id="f-name" placeholder="e.g. Alice Johnson">
              <span class="error" id="f-name-err"></span>
            </div>
            <div class="form-group">
              <label for="f-age">Age</label>
              <input type="number" id="f-age" min="1" max="120" placeholder="e.g. 30">
              <span class="error" id="f-age-err"></span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="f-gender">Gender</label>
              <select id="f-gender">
                <option value="">Select gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
              <span class="error" id="f-gender-err"></span>
            </div>
            <div class="form-group">
              <label for="f-contact">Contact (10 digits)</label>
              <input type="tel" id="f-contact" placeholder="e.g. 0501234567" maxlength="10">
              <span class="error" id="f-contact-err"></span>
            </div>
          </div>
          <div class="form-group">
            <label for="f-email">Email</label>
            <input type="email" id="f-email" placeholder="e.g. alice@email.com">
            <span class="error" id="f-email-err"></span>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('pax-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="submitForm()">Save</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="del-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Confirm Delete</h3>
        <button class="modal-close" aria-label="Close" onclick="closeModal('del-modal')"><span class="apple-emoji">❌</span></button>
      </div>
      <div class="modal-body">
        <p id="del-confirm-text"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('del-modal')">Cancel</button>
        <button class="btn btn-danger" id="del-confirm-btn">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/passengers.js"></script>
</body>
</html>
