<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Ticket — TrainMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <style>
    /* Apple Color Emoji webfont — forces Apple-style emojis on every device */
    @font-face {
      font-family: 'Apple Color Emoji';
      src: url('https://cdn.jsdelivr.net/gh/samuelngs/apple-emoji-linux@latest/fonts/apple-emoji.ttf') format('truetype');
      font-display: swap;
    }
    .apple-emoji,
    .mobile-brand,
    .logo-icon,
    .success-icon,
    .sidebar-toggle,
    .modal-close {
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif !important;
      font-style: normal;
      font-weight: normal;
      font-variant: normal;
      text-transform: none;
      line-height: 1;
    }
    body, h1, h2, h3, p, span, button, label, input, select, td, th, a {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <nav id="sidebar"></nav>

  <div class="main-content">
    <header class="mobile-header">
      <span class="mobile-brand"><span class="apple-emoji">🚆</span> TrainMS</span>
      <button class="sidebar-toggle" aria-label="Toggle navigation" onclick="toggleSidebar()"><span class="apple-emoji">🍔</span></button>
    </header>

    <div class="page-header">
      <h1>Book a Ticket</h1>
      <div class="page-header-actions">
        <a href="search.html" class="btn btn-secondary btn-sm">← Back to Search</a>
      </div>
    </div>

    <div class="page-body">

      <!-- No train selected -->
      <div id="no-train-section" hidden>
        <div class="info-box warning section">
          No train selected. Please search for a train first.
        </div>
        <a href="search.html" class="btn btn-primary">Search Trains</a>
      </div>

      <!-- Booking form -->
      <div id="booking-form-section" hidden>
        <div class="card section">
          <div class="card-header"><h2>Selected Train</h2></div>
          <div class="card-body">
            <div class="train-detail-grid" id="train-info"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h2>Passenger Details</h2></div>
          <div class="card-body">

            <div id="pax-selector-group" class="pax-selector-group" hidden>
              <label for="pax-selector">Select Existing Passenger (auto-fill form)</label>
              <select id="pax-selector">
                <option value="">— Select passenger or fill manually below —</option>
              </select>
            </div>

            <form id="booking-form" novalidate>
              <div class="form-row">
                <div class="form-group">
                  <label for="pax-name">Full Name</label>
                  <input type="text" id="pax-name" placeholder="e.g. Alice Johnson">
                  <span class="error" id="name-error"></span>
                </div>
                <div class="form-group">
                  <label for="pax-age">Age</label>
                  <input type="number" id="pax-age" min="1" max="120" placeholder="e.g. 30">
                  <span class="error" id="age-error"></span>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="pax-gender">Gender</label>
                  <select id="pax-gender">
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                  </select>
                  <span class="error" id="gender-error"></span>
                </div>
                <div class="form-group">
                  <label for="pax-contact">Contact (10 digits)</label>
                  <input type="tel" id="pax-contact" placeholder="e.g. 0501234567" maxlength="10">
                  <span class="error" id="contact-error"></span>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="pax-seats">Seats (1–6)</label>
                  <input type="number" id="pax-seats" min="1" max="6" value="1">
                  <span class="error" id="seats-error"></span>
                </div>
                <div class="form-group">
                  <label for="pax-class">Class</label>
                  <select id="pax-class">
                    <option value="Economy">Economy</option>
                    <option value="Business">Business</option>
                  </select>
                </div>
              </div>

              <div class="booking-summary mt-md">
                <div class="booking-summary-row">
                  <span>Fare per seat:</span>
                  <span id="fare-per-seat">$0.00</span>
                </div>
                <div class="booking-summary-row">
                  <span>Seats:</span>
                  <span id="fare-seats">1</span>
                </div>
                <div class="booking-summary-row total">
                  <span>Total Fare:</span>
                  <span id="fare-total">$0.00</span>
                </div>
              </div>

              <div class="btn-group mt-md">
                <button type="submit" class="btn btn-primary">Confirm Booking</button>
                <a href="search.html" class="btn btn-secondary">Cancel</a>
              </div>
            </form>

          </div>
        </div>
      </div>

      <!-- Success state -->
      <div id="booking-success" hidden>
        <div class="card">
          <div class="card-body success-box">
            <span class="success-icon"><span class="apple-emoji" style="font-size:48px;">✅</span></span>
            <div class="success-booking-id" id="success-booking-id"></div>
            <div class="success-details" id="success-details"></div>
            <div class="success-actions">
              <a href="my-bookings.html" id="btn-my-bookings" class="btn btn-primary" hidden>View My Bookings</a>
              <a href="search.html" class="btn btn-secondary">Search Again</a>
              <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
