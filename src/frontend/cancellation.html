<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancel Ticket — TrainMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <style>
    /* Apple Color Emoji webfont — forces Apple-style emojis on every device */
    @font-face {
      font-family: 'Apple Color Emoji';
      src: url('https://cdn.jsdelivr.net/gh/samuelngs/apple-emoji-linux@latest/fonts/apple-emoji.ttf') format('truetype');
      font-display: swap;
    }
    .apple-emoji,
    .mobile-brand,
    .logo-icon,
    .success-icon,
    .sidebar-toggle,
    .modal-close {
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif !important;
      font-style: normal;
      font-weight: normal;
      font-variant: normal;
      text-transform: none;
      line-height: 1;
    }
    body, h1, h2, h3, p, span, button, label, input, select, td, th, a {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <nav id="sidebar"></nav>

  <div class="main-content">
    <header class="mobile-header">
      <span class="mobile-brand"><span class="apple-emoji">🚆</span> TrainMS</span>
      <button class="sidebar-toggle" aria-label="Toggle navigation" onclick="toggleSidebar()"><span class="apple-emoji">🍔</span></button>
    </header>

    <div class="page-header">
      <h1>Cancel Ticket</h1>
      <div class="page-header-actions">
        <a href="my-bookings.html" id="back-link" class="btn btn-secondary btn-sm">← My Bookings</a>
      </div>
    </div>

    <div class="page-body">

      <!-- Lookup form (shown when no bookingId in URL) -->
      <div id="lookup-section" hidden>
        <div class="card booking-lookup">
          <div class="card-header"><h2>Find Booking</h2></div>
          <div class="card-body">
            <div class="form-group">
              <label for="lookup-input">Booking ID</label>
              <input type="text" id="lookup-input" placeholder="e.g. B001">
              <span class="error" id="lookup-error"></span>
            </div>
            <button class="btn btn-primary" id="lookup-btn">Find Booking</button>
          </div>
        </div>
      </div>

      <!-- Booking details + confirm -->
      <div id="details-section" hidden>
        <div class="card section">
          <div class="card-header"><h2>Booking Details</h2></div>
          <div class="table-wrapper">
            <table>
              <tbody id="booking-details-body"></tbody>
            </table>
          </div>
        </div>

        <div class="card section">
          <div class="card-header"><h2>Cancellation Summary</h2></div>
          <div class="card-body">
            <div class="info-box warning mb-md">
              <strong>Cancellation Policy:</strong> A 10% fee applies to all cancellations.
              The remaining 90% will be refunded.
            </div>
            <div class="booking-summary" id="refund-summary"></div>
            <div class="btn-group mt-md">
              <button class="btn btn-danger" id="confirm-cancel-btn">Confirm Cancellation</button>
              <a href="#" id="go-back-link" class="btn btn-secondary">Go Back</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Already cancelled -->
      <div id="already-cancelled-section" hidden>
        <div class="info-box warning section">
          This booking has already been cancelled.
        </div>
        <div class="btn-group">
          <a href="my-bookings.html" class="btn btn-secondary">My Bookings</a>
          <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>
        </div>
      </div>

      <!-- Success state -->
      <div id="success-section" hidden>
        <div class="card">
          <div class="card-body success-box">
            <span class="success-icon"><span class="apple-emoji" style="font-size:48px;">✅</span></span>
            <div class="success-booking-id" id="success-heading">Booking Cancelled</div>
            <div class="success-details" id="success-details"></div>
            <div class="success-actions" id="success-actions"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/cancellation.js"></script>
</body>
</html>
