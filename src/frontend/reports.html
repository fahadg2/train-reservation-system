<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — TrainMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <style>
    /* Apple Color Emoji webfont — forces Apple-style emojis on every device */
    @font-face {
      font-family: 'Apple Color Emoji';
      src: url('https://cdn.jsdelivr.net/gh/samuelngs/apple-emoji-linux@latest/fonts/apple-emoji.ttf') format('truetype');
      font-display: swap;
    }
    .apple-emoji,
    .mobile-brand,
    .logo-icon,
    .success-icon,
    .sidebar-toggle,
    .modal-close {
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif !important;
      font-style: normal;
      font-weight: normal;
      font-variant: normal;
      text-transform: none;
      line-height: 1;
    }
    body, h1, h2, h3, p, span, button, label, input, select, td, th, a {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <nav id="sidebar"></nav>

  <div class="main-content">
    <header class="mobile-header">
      <span class="mobile-brand"><span class="apple-emoji">🚆</span> TrainMS</span>
      <button class="sidebar-toggle" aria-label="Toggle navigation" onclick="toggleSidebar()"><span class="apple-emoji">🍔</span></button>
    </header>

    <div class="page-header">
      <h1>Reports</h1>
    </div>

    <div class="page-body">

      <div class="filter-tabs section">
        <button class="filter-tab active" data-type="Daily"   onclick="setReportType('Daily')">Daily</button>
        <button class="filter-tab"        data-type="Weekly"  onclick="setReportType('Weekly')">Weekly</button>
        <button class="filter-tab"        data-type="Monthly" onclick="setReportType('Monthly')">Monthly</button>
      </div>

      <div class="card section">
        <div class="card-body">
          <div class="filter-bar">
            <div class="form-group">
              <label for="start-date">From</label>
              <input type="date" id="start-date">
            </div>
            <div class="form-group">
              <label for="end-date">To</label>
              <input type="date" id="end-date">
            </div>
          </div>
        </div>
      </div>

      <div class="stat-grid section" id="stat-grid"></div>

      <div class="card section">
        <div class="card-header">
          <h2 id="chart-title">Daily Bookings</h2>
        </div>
        <div class="card-body">
          <div class="chart-wrapper" id="chart-area"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 id="table-title">Daily Report</h2>
          <button class="btn btn-secondary btn-sm" onclick="exportCsv()">Export CSV</button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Period</th>
                <th>Bookings</th>
                <th>Revenue</th>
                <th>Cancellations</th>
                <th>Occ. %</th>
              </tr>
            </thead>
            <tbody id="report-body"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/reports.js"></script>
</body>
</html>
