<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedules — TrainMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <style>
    /* Apple Color Emoji webfont — forces Apple-style emojis on every device */
    @font-face {
      font-family: 'Apple Color Emoji';
      src: url('https://cdn.jsdelivr.net/gh/samuelngs/apple-emoji-linux@latest/fonts/apple-emoji.ttf') format('truetype');
      font-display: swap;
    }
    .apple-emoji,
    .mobile-brand,
    .logo-icon,
    .success-icon,
    .sidebar-toggle,
    .modal-close {
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif !important;
      font-style: normal;
      font-weight: normal;
      font-variant: normal;
      text-transform: none;
      line-height: 1;
    }
    body, h1, h2, h3, p, span, button, label, input, select, td, th, a {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <nav id="sidebar"></nav>

  <div class="main-content">
    <header class="mobile-header">
      <span class="mobile-brand"><span class="apple-emoji">🚆</span> TrainMS</span>
      <button class="sidebar-toggle" aria-label="Toggle navigation" onclick="toggleSidebar()"><span class="apple-emoji">☰</span></button>
    </header>

    <div class="page-header">
      <h1>Schedules</h1>
      <div class="page-header-actions">
        <button id="add-btn" class="btn btn-primary" onclick="openAddModal()" hidden>+ Add Schedule</button>
      </div>
    </div>

    <div class="page-body">

      <div class="card section">
        <div class="card-body">
          <div class="filter-bar">
            <div class="form-group">
              <label for="filter-route">Route</label>
              <select id="filter-route">
                <option value="">All Routes</option>
              </select>
            </div>
            <div class="form-group">
              <label for="filter-date">Date</label>
              <input type="date" id="filter-date">
            </div>
            <button class="btn btn-secondary" onclick="clearFilters()">Clear Filters</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 id="table-heading">All Schedules</h2>
          <span id="table-count" class="text-muted"></span>
        </div>
        <div class="table-wrapper">
          <table id="schedules-table"></table>
        </div>
      </div>

    </div>
  </div>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" id="sched-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Schedule</h3>
        <button class="modal-close" aria-label="Close" onclick="closeModal('sched-modal')"><span class="apple-emoji">❌</span></button>
      </div>
      <div class="modal-body">
        <form id="sched-form" novalidate>
          <input type="hidden" id="f-sched-id">
          <div class="form-group">
            <label for="f-train">Train</label>
            <select id="f-train">
              <option value="">Select train</option>
            </select>
            <span class="error" id="f-train-err"></span>
          </div>
          <div id="train-preview" class="pax-selector-group" hidden>
            <div class="train-detail-grid" id="train-preview-grid"></div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="f-date">Date</label>
              <input type="date" id="f-date">
              <span class="error" id="f-date-err"></span>
            </div>
            <div class="form-group">
              <label for="f-platform">Platform (1–20)</label>
              <input type="number" id="f-platform" min="1" max="20" placeholder="e.g. 3">
              <span class="error" id="f-platform-err"></span>
            </div>
          </div>
            <div class="form-row">
            <div class="form-group">
              <label for="f-delay">Delay (minutes — 0 means on time)</label>
              <input type="number" id="f-delay" min="0" max="999" value="0">
              <span class="error" id="f-delay-err"></span>
            </div>
            <div class="form-group">
              <label for="f-seats">Seats Available</label>
              <input type="number" id="f-seats" min="0" placeholder="Defaults to full capacity">
              <span class="error" id="f-seats-err"></span>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('sched-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="submitForm()">Save</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="del-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Confirm Delete</h3>
        <button class="modal-close" aria-label="Close" onclick="closeModal('del-modal')"><span class="apple-emoji">❌</span></button>
      </div>
      <div class="modal-body">
        <p id="del-confirm-text"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('del-modal')">Cancel</button>
        <button class="btn btn-danger" id="del-confirm-btn">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/schedules.js"></script>
</body>
</html>
