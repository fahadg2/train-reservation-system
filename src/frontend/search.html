<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Trains — TrainMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <style>
    /* Apple Color Emoji webfont — forces Apple-style emojis on every device */
    @font-face {
      font-family: 'Apple Color Emoji';
      src: url('https://cdn.jsdelivr.net/gh/samuelngs/apple-emoji-linux@latest/fonts/apple-emoji.ttf') format('truetype');
      font-display: swap;
    }
    .apple-emoji,
    .mobile-brand,
    .logo-icon,
    .success-icon,
    .sidebar-toggle,
    .modal-close {
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif !important;
      font-style: normal;
      font-weight: normal;
      font-variant: normal;
      text-transform: none;
      line-height: 1;
    }
    body, h1, h2, h3, p, span, button, label, input, select, td, th, a {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <nav id="sidebar"></nav>

  <div class="main-content">
    <header class="mobile-header">
      <span class="mobile-brand"><span class="apple-emoji">🚆</span> TrainMS</span>
      <button class="sidebar-toggle" aria-label="Toggle navigation" onclick="toggleSidebar()"><span class="apple-emoji">☰</span></button>
    </header>

    <div class="page-header">
      <h1>Search Trains</h1>
    </div>

    <div class="page-body">
      <div class="card section">
        <div class="card-header"><h2>Find a Train</h2></div>
        <div class="card-body">
          <form id="search-form" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="from">From</label>
                <select id="from">
                  <option value="">Select departure city</option>
                </select>
                <span class="error" id="from-error"></span>
              </div>
              <div class="form-group">
                <label for="to">To</label>
                <select id="to">
                  <option value="">Select destination</option>
                </select>
                <span class="error" id="to-error"></span>
              </div>
              <div class="form-group">
                <label for="search-date">Travel Date</label>
                <input type="date" id="search-date">
                <span class="error" id="date-error"></span>
              </div>
              <div class="form-group">
                <label for="search-class">Class</label>
                <select id="search-class">
                  <option value="Economy">Economy</option>
                  <option value="Business">Business</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Search Trains</button>
          </form>
        </div>
      </div>

      <div id="results-section" hidden>
        <div class="card">
          <div class="card-header">
            <h2>Search Results</h2>
            <span id="results-count" class="text-muted"></span>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Train</th>
                  <th>Route</th>
                  <th>Departure</th>
                  <th>Arrival</th>
                  <th>Status</th>
                  <th>Fare / Seat</th>
                  <th>Seats Left</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="results-body">
                <tr class="empty-row"><td colspan="8">No results yet</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
