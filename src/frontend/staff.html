<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff — TrainMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <style>
    /* Apple Color Emoji webfont — forces Apple-style emojis on every device */
    @font-face {
      font-family: 'Apple Color Emoji';
      src: url('https://cdn.jsdelivr.net/gh/samuelngs/apple-emoji-linux@latest/fonts/apple-emoji.ttf') format('truetype');
      font-display: swap;
    }
    .apple-emoji,
    .mobile-brand,
    .logo-icon,
    .success-icon,
    .sidebar-toggle,
    .modal-close {
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif !important;
      font-style: normal;
      font-weight: normal;
      font-variant: normal;
      text-transform: none;
      line-height: 1;
    }
    body, h1, h2, h3, p, span, button, label, input, select, td, th, a {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <nav id="sidebar"></nav>

  <div class="main-content">
    <header class="mobile-header">
      <span class="mobile-brand"><span class="apple-emoji">🚆</span> TrainMS</span>
      <button class="sidebar-toggle" aria-label="Toggle navigation" onclick="toggleSidebar()"><span class="apple-emoji">☰</span></button>
    </header>

    <div class="page-header">
      <h1>Staff</h1>
      <div class="page-header-actions">
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Staff</button>
      </div>
    </div>

    <div class="page-body">

      <div class="stat-grid section" id="stat-grid"></div>

      <div class="card">
        <div class="card-header">
          <h2 id="table-heading">All Staff</h2>
          <span id="table-count" class="text-muted"></span>
        </div>
        <div class="card-body">
          <div class="filter-bar">
            <div class="form-group">
              <label for="search-input">Search by Username or Name</label>
              <input type="text" id="search-input" placeholder="e.g. john or John Smith">
            </div>
          </div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Username</th>
                <th>Display Name</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="staff-body"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Add / Edit Modal -->
  <div class="modal-overlay" id="staff-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Staff</h3>
        <button class="modal-close" aria-label="Close" onclick="closeModal('staff-modal')"><span class="apple-emoji">❌</span></button>
      </div>
      <div class="modal-body">
        <form id="staff-form" novalidate>
          <!-- Hidden field carries the username being edited (acts as the PK).
               Empty string = add mode, non-empty = edit mode. -->
          <input type="hidden" id="s-orig-username">

          <div class="form-group">
            <label for="f-display-name">Display Name</label>
            <input type="text" id="f-display-name" placeholder="e.g. John Smith">
            <span class="error" id="f-display-name-err"></span>
          </div>

          <div class="form-group">
            <label for="f-username">Username</label>
            <input type="text" id="f-username" placeholder="3–20 chars, letters/numbers/_">
            <span class="error" id="f-username-err"></span>
          </div>

          <div class="form-group" id="password-group">
            <label for="f-password">Password</label>
            <input type="password" id="f-password" placeholder="At least 6 characters">
            <span class="error" id="f-password-err"></span>
            <small id="password-hint" class="text-muted" style="display: block; margin-top: 4px;"></small>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('staff-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="submitForm()">Save</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="del-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Confirm Delete</h3>
        <button class="modal-close" aria-label="Close" onclick="closeModal('del-modal')"><span class="apple-emoji">❌</span></button>
      </div>
      <div class="modal-body">
        <p id="del-confirm-text"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('del-modal')">Cancel</button>
        <button class="btn btn-danger" id="del-confirm-btn">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/staff.js"></script>
</body>
</html>
